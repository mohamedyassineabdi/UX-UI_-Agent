<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UX/UI Audit Launcher</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      :root {
        --ey-yellow: #ffe600;
        --ey-gold: #cda349;
        --ink: #111827;
        --muted: #667085;
        --line: rgba(17, 24, 39, 0.12);
        --panel: rgba(255, 255, 255, 0.78);
        --cream: #f7f2e8;
        --cream-2: #fffbf2;
        --danger: #b54708;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: Aptos, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          linear-gradient(rgba(17, 24, 39, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 24, 39, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 80% 5%, rgba(255, 230, 0, 0.24), transparent 22rem),
          linear-gradient(135deg, var(--cream-2), var(--cream));
        background-size: 56px 56px, 56px 56px, auto, auto;
        min-height: 100vh;
      }

      button,
      input {
        font: inherit;
      }

      input[type="file"] {
        cursor: pointer;
      }

      .topbar {
        align-items: center;
        background: rgba(255, 255, 255, 0.86);
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        min-height: 72px;
        padding: 0 8vw;
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(16px);
      }

      .brand {
        align-items: baseline;
        display: flex;
        gap: 0.42rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .ey-mark {
        background: transparent;
        color: #4a4a4a;
        display: grid;
        font-size: 2rem;
        font-weight: 900;
        height: 43px;
        letter-spacing: -0.11em;
        line-height: 0.95;
        place-items: end start;
        position: relative;
        top: 1px;
        width: 47px;
      }

      .ey-mark::before {
        background: var(--ey-yellow);
        clip-path: polygon(100% 0, 100% 100%, 0 100%);
        content: "";
        height: 13px;
        left: 2px;
        position: absolute;
        top: 0;
        width: 43px;
      }

      .brand-name {
        align-items: baseline;
        color: #4a4a4a;
        display: inline-flex;
        font-size: 1.15rem;
        font-weight: 800;
        gap: 0.12rem;
        letter-spacing: -0.06em;
        line-height: 1;
        transform: translateY(1px);
      }

      .brand-name strong {
        color: inherit;
        font-weight: inherit;
      }

      .brand-plus {
        display: inline-block;
        font-size: 0;
        height: 9px;
        margin-left: 1px;
        position: relative;
        transform: translateY(1px);
        width: 9px;
      }

      .brand-plus::before,
      .brand-plus::after {
        border-radius: 999px;
        content: "";
        position: absolute;
      }

      .brand-plus::before {
        background: #f72585;
        height: 2px;
        left: 0;
        top: 3.5px;
        width: 9px;
      }

      .brand-plus::after {
        background: #2563eb;
        height: 9px;
        left: 3.5px;
        top: 0;
        width: 2px;
      }

      .topbar nav {
        align-items: center;
        color: var(--muted);
        display: flex;
        font-size: 0.9rem;
        font-weight: 700;
        gap: 1.5rem;
      }

      .nav-button {
        background: transparent;
        border: 0;
        color: inherit;
        cursor: pointer;
        font-weight: inherit;
        padding: 0;
      }

      .nav-button:hover {
        color: var(--ink);
      }

      .shell {
        margin: 0 auto;
        max-width: 1180px;
        padding: 72px 28px 96px;
      }

      .hero {
        display: grid;
        gap: 44px;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
        align-items: center;
      }

      .ey-pill {
        align-items: center;
        background: white;
        border: 1px solid var(--line);
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.78rem;
        font-weight: 900;
        gap: 0.5rem;
        letter-spacing: 0.16em;
        padding: 0.6rem 0.9rem;
        text-transform: uppercase;
      }

      .ey-dot {
        background: var(--ey-yellow);
        border-radius: 50%;
        height: 0.62rem;
        width: 0.62rem;
      }

      h1 {
        font-size: clamp(3rem, 7vw, 6.6rem);
        letter-spacing: -0.075em;
        line-height: 0.9;
        margin: 1.2rem 0 1rem;
        max-width: 800px;
      }

      .hero-copy {
        color: var(--muted);
        font-size: clamp(1.1rem, 1.5vw, 1.35rem);
        line-height: 1.7;
        max-width: 660px;
      }

      .hero-panel {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(17, 24, 39, 0.1);
        border-radius: 34px;
        box-shadow: 0 28px 80px rgba(17, 24, 39, 0.12);
        overflow: hidden;
      }

      .panel-head {
        align-items: center;
        background: #f3f4f0;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 0.5rem;
        padding: 1rem 1.2rem;
      }

      .dot {
        background: #cfd3d0;
        border-radius: 50%;
        height: 10px;
        width: 10px;
      }

      .dot:first-child {
        background: var(--ey-yellow);
      }

      .panel-body {
        padding: 28px;
      }

      .choice-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin: 26px 0;
      }

      .choice {
        background: white;
        border: 1px solid var(--line);
        border-radius: 22px;
        color: var(--ink);
        cursor: pointer;
        min-height: 132px;
        padding: 20px;
        text-align: left;
        transition: transform 0.2s ease, border 0.2s ease, box-shadow 0.2s ease;
      }

      .choice:hover,
      .choice.active {
        border-color: rgba(205, 163, 73, 0.75);
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.13);
        transform: translateY(-3px);
      }

      .choice.disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .choice strong {
        display: block;
        font-size: 1.1rem;
        margin-bottom: 0.55rem;
      }

      .choice small {
        color: var(--muted);
        line-height: 1.5;
      }

      .field {
        display: grid;
        gap: 0.65rem;
        margin-top: 22px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .field input {
        background: white;
        border: 1px solid var(--line);
        border-radius: 18px;
        color: var(--ink);
        outline: 0;
        padding: 1rem 1.1rem;
        width: 100%;
      }

      .field input:focus {
        border-color: var(--ey-gold);
        box-shadow: 0 0 0 4px rgba(205, 163, 73, 0.16);
      }

      .field-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: 1fr 1fr;
      }

      .upload-zone {
        background: rgba(255, 255, 255, 0.82);
        border: 1.5px dashed rgba(17, 24, 39, 0.22);
        border-radius: 22px;
        cursor: pointer;
        display: grid;
        gap: 0.45rem;
        padding: 1.2rem;
      }

      .upload-zone:focus-within,
      .upload-zone:hover {
        border-color: var(--ey-gold);
        box-shadow: 0 0 0 4px rgba(205, 163, 73, 0.12);
      }

      .upload-zone strong {
        color: var(--ink);
      }

      .upload-zone span {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .upload-zone input {
        margin-top: 0.45rem;
        max-width: 100%;
      }

      .file-list {
        color: var(--muted);
        display: grid;
        font-size: 0.86rem;
        gap: 0.35rem;
        margin: 0.75rem 0 0;
        padding-left: 1.1rem;
      }

      .screenshot-grid {
        display: flex;
        gap: 14px;
        margin-top: 0.9rem;
        overflow-x: auto;
        padding: 0.1rem 0.1rem 0.8rem;
        scroll-snap-type: x proximity;
        scrollbar-color: rgba(17, 24, 39, 0.28) transparent;
      }

      .screenshot-card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 16px 36px rgba(17, 24, 39, 0.08);
        flex: 0 0 156px;
        overflow: hidden;
        position: relative;
        scroll-snap-align: start;
      }

      .screenshot-thumb {
        align-items: center;
        background:
          linear-gradient(45deg, rgba(17, 24, 39, 0.04) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(17, 24, 39, 0.04) 25%, transparent 25%),
          #f9fafb;
        background-size: 18px 18px;
        display: flex;
        aspect-ratio: 1 / 1;
        justify-content: center;
        overflow: hidden;
      }

      .screenshot-thumb img {
        height: 100%;
        object-fit: contain;
        width: 100%;
      }

      .screenshot-meta {
        display: grid;
        gap: 0.55rem;
        padding: 0.85rem;
      }

      .screenshot-name-row small {
        color: var(--muted);
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .remove-screenshot {
        align-items: center;
        background: rgba(17, 24, 39, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 999px;
        color: white;
        cursor: pointer;
        display: flex;
        font-size: 0.72rem;
        font-weight: 900;
        height: 26px;
        justify-content: center;
        padding: 0;
        position: absolute;
        right: 8px;
        top: 8px;
        width: 26px;
        z-index: 2;
      }

      .remove-screenshot:hover {
        background: var(--ink);
        border-color: white;
        color: white;
      }

      .screenshot-label-input {
        border-radius: 14px !important;
        font-size: 0.88rem !important;
        padding: 0.72rem 0.8rem !important;
      }

      .segmented {
        background: rgba(17, 24, 39, 0.06);
        border: 1px solid var(--line);
        border-radius: 999px;
        display: grid;
        gap: 6px;
        grid-template-columns: 1fr 1fr;
        padding: 6px;
      }

      .segmented button {
        background: transparent;
        border: 0;
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        font-weight: 850;
        padding: 0.9rem 1rem;
      }

      .segmented button.active {
        background: var(--ink);
        color: white;
      }

      .primary {
        align-items: center;
        background: var(--ink);
        border: 0;
        border-radius: 999px;
        color: white;
        cursor: pointer;
        display: inline-flex;
        font-weight: 900;
        gap: 0.75rem;
        justify-content: center;
        margin-top: 24px;
        padding: 1rem 1.35rem;
        text-decoration: none;
        width: 100%;
      }

      .primary::after {
        color: var(--ey-yellow);
        content: "->";
        font-size: 1rem;
      }

      .primary:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .error {
        background: #fff4ed;
        border: 1px solid #fed7aa;
        border-radius: 16px;
        color: var(--danger);
        margin-top: 16px;
        padding: 0.9rem 1rem;
      }

      .modal-backdrop {
        align-items: center;
        background: rgba(17, 24, 39, 0.48);
        display: flex;
        inset: 0;
        justify-content: center;
        padding: 24px;
        position: fixed;
        z-index: 100;
      }

      .modal {
        background:
          radial-gradient(circle at 86% 4%, rgba(255, 230, 0, 0.28), transparent 18rem),
          #fffdf8;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 34px;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.28);
        max-height: min(760px, 88vh);
        max-width: 760px;
        overflow: hidden;
        width: 100%;
      }

      .modal-main {
        padding: 32px;
      }

      .progress-wrap {
        background: rgba(17, 24, 39, 0.08);
        border-radius: 999px;
        height: 12px;
        overflow: hidden;
        margin: 22px 0;
      }

      .progress {
        background: linear-gradient(90deg, var(--ey-yellow), var(--ey-gold));
        height: 100%;
        transition: width 0.45s ease;
      }

      .stage {
        color: var(--muted);
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .log {
        background: #111827;
        border-radius: 22px;
        color: #d1d5db;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 0.78rem;
        line-height: 1.55;
        margin-top: 20px;
        max-height: 260px;
        overflow: auto;
        padding: 18px;
      }

      .log.debug-only {
        margin-top: 22px;
      }

      .success-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      .artifact-summary {
        background: rgba(17, 24, 39, 0.04);
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: 18px;
        color: var(--muted);
        display: grid;
        gap: 0.55rem;
        margin-top: 18px;
        padding: 0.95rem 1rem;
      }

      .artifact-summary strong {
        color: var(--ink);
      }

      .artifact-path {
        background: rgba(255, 255, 255, 0.75);
        border-radius: 12px;
        color: var(--ink);
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 0.84rem;
        line-height: 1.5;
        padding: 0.72rem 0.82rem;
        word-break: break-word;
      }

      .ghost {
        background: white;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        cursor: pointer;
        font-weight: 850;
        padding: 0.95rem 1.2rem;
      }

      .process-list {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      .process-step {
        align-items: start;
        display: grid;
        gap: 14px;
        grid-template-columns: 36px 1fr;
      }

      .process-step span {
        background: var(--ey-yellow);
        border-radius: 50%;
        display: grid;
        font-weight: 900;
        height: 36px;
        place-items: center;
        width: 36px;
      }

      .process-step p {
        color: var(--muted);
        margin: 0.3rem 0 0;
      }

      .welcome-screen {
        --cursor-x: 72%;
        --cursor-y: 22%;
        align-items: center;
        background:
          radial-gradient(circle at var(--cursor-x) var(--cursor-y), rgba(255, 230, 0, 0.24), transparent 18rem),
          radial-gradient(circle at calc(100% - var(--cursor-x)) calc(100% - var(--cursor-y)), rgba(37, 99, 235, 0.12), transparent 20rem),
          radial-gradient(circle at 20% 90%, rgba(247, 37, 133, 0.09), transparent 16rem);
        display: grid;
        min-height: 100vh;
        padding: 36px 28px;
        transition: background 0.18s ease-out;
      }

      .welcome-card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(255, 253, 248, 0.86));
        border: 1px solid rgba(17, 24, 39, 0.1);
        border-radius: 38px;
        box-shadow: 0 34px 110px rgba(17, 24, 39, 0.14);
        margin: 0 auto;
        max-width: 1040px;
        overflow: hidden;
        padding: clamp(30px, 6vw, 70px);
        width: min(100%, 1040px);
      }

      .welcome-brand {
        margin-bottom: 46px;
      }

      .welcome-layout {
        align-items: center;
        display: grid;
        gap: clamp(28px, 5vw, 70px);
        grid-template-columns: minmax(0, 1.15fr) minmax(240px, 0.85fr);
      }

      .welcome-title {
        font-size: clamp(3rem, 7vw, 6.9rem);
        letter-spacing: -0.08em;
        line-height: 0.86;
        margin: 1.1rem 0 1.3rem;
        max-width: 760px;
      }

      .welcome-copy {
        color: var(--muted);
        font-size: clamp(1.05rem, 1.5vw, 1.32rem);
        line-height: 1.7;
        margin: 0;
        max-width: 680px;
      }

      .welcome-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 34px;
      }

      .welcome-actions .primary {
        margin-top: 0;
        width: auto;
      }

      .welcome-note {
        align-self: center;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .robot-scene {
        --head-x: 0px;
        --head-y: 0px;
        --eye-x: 0px;
        --eye-y: 0px;
        --left-arm-rot: 18deg;
        --right-arm-rot: -18deg;
        --left-forearm-rot: -24deg;
        --right-forearm-rot: 24deg;
        align-items: center;
        display: grid;
        justify-items: center;
        min-height: 330px;
        position: relative;
      }

      .robot-bubble {
        background: white;
        border: 1px solid var(--line);
        border-radius: 22px 22px 22px 6px;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
        color: var(--ink);
        font-size: 0.94rem;
        font-weight: 850;
        left: 6px;
        line-height: 1.35;
        max-width: 190px;
        padding: 0.9rem 1rem;
        position: absolute;
        top: 12px;
      }

      .robot {
        align-items: center;
        display: grid;
        gap: 0;
        justify-items: center;
        margin-top: 60px;
        position: relative;
      }

      .robot::after {
        background: radial-gradient(ellipse, rgba(17, 24, 39, 0.22), transparent 70%);
        bottom: -20px;
        content: "";
        height: 34px;
        position: absolute;
        width: 210px;
        z-index: 0;
      }

      .robot-head {
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(226, 230, 232, 0.96) 48%, rgba(168, 177, 187, 0.98)),
          radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.98), transparent 44px);
        border: 1px solid rgba(17, 24, 39, 0.16);
        border-radius: 42px;
        box-shadow:
          inset 12px 12px 24px rgba(255, 255, 255, 0.82),
          inset -16px -20px 30px rgba(17, 24, 39, 0.16),
          0 28px 60px rgba(17, 24, 39, 0.22);
        height: 144px;
        position: relative;
        transform: translate(var(--head-x), var(--head-y));
        transition: transform 0.16s ease-out;
        width: 184px;
        z-index: 3;
      }

      .robot-head::before {
        background: linear-gradient(180deg, #4b5563, #111827);
        border-radius: 999px;
        content: "";
        height: 32px;
        left: 50%;
        position: absolute;
        top: -31px;
        transform: translateX(-50%);
        width: 5px;
      }

      .robot-head::after {
        background:
          radial-gradient(circle at 38% 32%, white 0 18%, transparent 20%),
          var(--ey-yellow);
        border: 3px solid white;
        border-radius: 50%;
        box-shadow: 0 0 0 6px rgba(255, 230, 0, 0.18);
        content: "";
        height: 20px;
        left: 50%;
        position: absolute;
        top: -52px;
        transform: translateX(-50%);
        width: 20px;
      }

      .robot-ear {
        background: linear-gradient(145deg, #f8fafc, #9ca3af);
        border: 1px solid rgba(17, 24, 39, 0.16);
        border-radius: 999px;
        box-shadow: inset -6px -8px 12px rgba(17, 24, 39, 0.12);
        height: 58px;
        position: absolute;
        top: 43px;
        width: 18px;
      }

      .robot-ear.left {
        left: -12px;
      }

      .robot-ear.right {
        right: -12px;
      }

      .robot-visor {
        background:
          radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.18), transparent 34px),
          linear-gradient(145deg, #0f172a, #1f2937 58%, #030712);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 31px;
        box-shadow:
          inset 0 2px 10px rgba(255, 255, 255, 0.12),
          inset 0 -10px 22px rgba(0, 0, 0, 0.42);
        height: 78px;
        left: 22px;
        overflow: hidden;
        position: absolute;
        top: 33px;
        width: 140px;
      }

      .robot-visor::before {
        background: linear-gradient(115deg, rgba(255, 255, 255, 0.24), transparent 38%);
        content: "";
        height: 120%;
        left: -18px;
        position: absolute;
        top: -40px;
        transform: rotate(12deg);
        width: 70px;
      }

      .robot-eye-row {
        align-items: center;
        display: flex;
        gap: 34px;
        justify-content: center;
        padding-top: 24px;
      }

      .robot-eye {
        background: #67e8f9;
        border-radius: 50%;
        box-shadow:
          0 0 12px rgba(103, 232, 249, 0.86),
          0 0 24px rgba(37, 99, 235, 0.58);
        height: 18px;
        opacity: 0.95;
        position: relative;
        transform: translate(var(--eye-x), var(--eye-y));
        transition: transform 0.12s ease-out;
        width: 18px;
      }

      .robot-eye::after {
        background: white;
        border-radius: 50%;
        content: "";
        height: 6px;
        left: 4px;
        position: absolute;
        top: 3px;
        width: 6px;
      }

      .robot-mouth {
        background: linear-gradient(90deg, transparent, rgba(255, 230, 0, 0.95), transparent);
        border-radius: 999px;
        height: 4px;
        left: 50%;
        position: absolute;
        top: 52px;
        transform: translateX(-50%);
        width: 58px;
      }

      .robot-neck {
        background: linear-gradient(180deg, #9ca3af, #f9fafb);
        border: 1px solid rgba(17, 24, 39, 0.12);
        height: 28px;
        margin-top: -2px;
        width: 54px;

        const status = job?.status || (error ? "failed" : "queued");

                  React.createElement("div", { className: "artifact-path" }, job.outputDir)
                ),
              status === "failed" && React.createElement("div", { className: "success-actions" }, React.createElement("button", { className: "ghost", onClick: onClose }, "Close")),
              shouldShowLog && React.createElement("pre", { className: "log debug-only" }, logs.join("\n"))
